name: Release
on:
  push:
    tags:
      - v*.*.*

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set Version
        run: echo "PROVIDER_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build and Package Provider
        run: |
          cd provider && go mod tidy && cd ..
          make provider_dist-linux-amd64
          make provider_dist-linux-arm64
          make provider_dist-darwin-amd64
          make provider_dist-darwin-arm64
          make provider_dist-windows-amd64

      - name: Build SDK
        run: make build_nodejs

      - name: GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            dist/*.tar.gz

      - name: Publish to npm
        run: |
          cd sdk/nodejs/bin
          npm publish --access public --provenance
