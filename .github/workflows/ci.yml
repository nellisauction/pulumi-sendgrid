name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build Provider
        env:
          GONOSUMDB: "github.com/arslanbekov/terraform-provider-sendgrid"
        run: |
          cd provider && go mod tidy && cd ..
          make provider_no_deps PROVIDER_VERSION=0.0.0-ci

      - name: Build SDK
        run: make generate_nodejs PROVIDER_VERSION=0.0.0-ci

      - name: Test Provider
        run: make test_provider PROVIDER_VERSION=0.0.0-ci
